name: Build mod

on:
  push:
  workflow_dispatch:

defaults:
  run:
    working-directory: spawnertooltip-1.20.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.8
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.8

      - name: Build
        run: gradle build --no-daemon

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: spawnertooltip-1.20.1-jar
          path: spawnertooltip-1.20.1/build/libs/*.jar
